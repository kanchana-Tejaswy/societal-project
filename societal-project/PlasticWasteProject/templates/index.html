<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Waste | Analyze</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Relative Static Paths for direct HTML execution -->
    <link rel="stylesheet" href="/static/index.css">
    <script defer src="/static/index.js"></script>
</head>

<body class="landing-page">

    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="/" class="nav-brand">
            <span class="icon">♻️</span> SmartWaste
        </a>

        <div class="nav-links">
            <a href="/" class="nav-item">Home</a>
            <a href="/submit" class="nav-item active">Submit Waste</a>
            <a href="/dashboard" class="nav-item">Analytics</a>
        </div>

        <button class="mobile-menu-btn" id="mobileMenuBtn">
            <span></span><span></span><span></span>
        </button>
    </nav>

    <!-- MOBILE MENU -->
    <div class="mobile-drawer" id="mobileDrawer">
        <a href="/" class="nav-item">Home</a>
        <a href="/submit" class="nav-item active">Submit Waste</a>
        <a href="/dashboard" class="nav-item">Analytics</a>
    </div>

    <!-- FORM SECTION -->
    <section class="submit-section" style="padding: 120px 20px; display:flex; justify-content:center; align-items:center; min-height:100vh;">

        <form action="/add" method="POST" enctype="multipart/form-data" id="wasteForm">

            <h2>Analyze Waste</h2>
            <p>Upload waste details for AI classification</p>

            <!-- Plastic Type -->
            <label>Plastic Type</label>
            <select name="plastic_type" required>
                <option value="" disabled selected>Select Type</option>
                <option value="PET">PET</option>
                <option value="HDPE">HDPE</option>
                <option value="PVC">PVC</option>
            </select>

            <!-- Quantity -->
            <label>Quantity</label>
            <input type="number" name="quantity" min="1" required placeholder="Enter quantity">

            <!-- SINGLE IMAGE UPLOAD -->
            <label>Upload Image</label>
            <input type="file" name="image" accept="image/*" required>

            <!-- SUBMIT -->
            <button type="submit" class="btn-submit">
                Run AI Analysis ♻️
            </button>

        </form>

    </section>

</body>
</html>

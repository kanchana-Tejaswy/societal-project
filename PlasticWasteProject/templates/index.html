<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Waste | Analyze</title>
    
    <!-- Clean External Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Native Static Connections (Allows VSCode Preview & Flask) -->
    <link rel="manifest" href="/static/manifest.json">
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
    <script defer src="{{ url_for('static', filename='main.js') }}"></script>
</head>
<body class="landing-page">
    
    <!-- Application Navigation Bar -->
    <nav class="navbar">
        <a href="{{ url_for('home') }}" class="nav-brand">
            <span class="icon">♻️</span> SmartWaste
        </a>
        <div class="nav-links">
            <a href="{{ url_for('home') }}" class="nav-item">Home</a>
            <a href="{{ url_for('submit') }}" class="nav-item active">Log Waste</a>
            <a href="{{ url_for('dashboard') }}" class="nav-item">Dashboard</a>
        </div>
        <button class="mobile-menu-btn" id="mobileMenuBtn">
            <span></span><span></span><span></span>
        </button>
    </nav>

    <!-- Mobile Navigation Drawer -->
    <div class="mobile-drawer" id="mobileDrawer">
        <a href="{{ url_for('home') }}" class="nav-item">Home</a>
        <a href="{{ url_for('submit') }}" class="nav-item active">Log Waste</a>
        <a href="{{ url_for('dashboard') }}" class="nav-item">Dashboard</a>
    </div>

    <!-- Strictly Submit Form Logic inside Index -->
    <section class="submit-section">
        <form action="{{ url_for('add_waste') }}" method="POST" enctype="multipart/form-data" id="wasteForm" class="fade-in delay-1">
            <h2>Citizen Portal</h2>
            <p>Input waste details to run AI classification and earn rewards.</p>
            
            <label>Citizen ID / Name</label>
            <input type="text" name="user_id" id="user_id" placeholder="Enter your unique ID" required>

            <label>Plastic Type</label>
            <select name="plastic_type" id="plastic_type" required>
                <option value="" disabled selected>Select Plastic Type...</option>
                <option value="PET">PET (Bottles, Containers)</option>
                <option value="HDPE">HDPE (Milk Jugs, Detergent)</option>
                <option value="PVC">PVC (Pipes, Medical Tubes)</option>
            </select>
            
            <label>Quantity Metric</label>
            <input type="number" name="quantity" id="quantity" placeholder="Units / Pieces" required min="1">
            
            <label>Upload Material Image</label>
            <input type="file" name="image" id="image" required accept="image/*">
            
            <!-- Submit Action -->
            <button type="submit" class="btn-submit" id="submitBtn">
                <span class="btn-text">Run Intelligence ♻️</span>
            </button>
        </form>
    </section>

</body>
</html>
